<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Lightweight Chart</title>
    <link rel="stylesheet" href="/css/app.css" />
    <script type="importmap">
      {
        "imports": {
          "lightweight-charts": "/vendor/lightweight-charts.mjs"
        }
      }
    </script>
  </head>
  <body>
    <div class="tv-app" aria-busy="true">
      <div class="app-loader" id="app-loader" role="status" aria-label="Loading chart">
        <div class="app-loader__spinner" aria-hidden="true"></div>
      </div>
      <header class="tv-toolbar" aria-label="Chart toolbar">
        <div class="tv-toolbar__left">
          <div class="tv-symbol" id="symbol-picker">
            <button
              type="button"
              class="tv-symbol__trigger"
              id="symbol-trigger"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span class="tv-symbol__ticker" id="symbol-ticker">NQ</span>
              <svg class="tv-symbol__chev" width="10" height="6" viewBox="0 0 10 6" aria-hidden="true">
                <path fill="currentColor" d="M1 1l4 4 4-4" />
              </svg>
            </button>
            <div class="tv-symbol__dropdown" id="symbol-dropdown" hidden>
              <input
                type="text"
                class="tv-symbol__search"
                id="symbol-search"
                role="searchbox"
                placeholder="Search symbol (e.g. NQ, BTC, AAPL)…"
                autocomplete="off"
                spellcheck="false"
              />
              <ul class="tv-symbol__list" id="symbol-list" role="listbox"></ul>
            </div>
          </div>

          <div class="tv-toolbar__sep" aria-hidden="true"></div>

          <div id="timeframe-picker" class="tv-tf"></div>
        </div>

        <div class="tv-toolbar__right">
          <button type="button" class="tv-toolbar__icon-btn" id="settings-btn" title="Settings" aria-label="Settings">
            <svg class="tv-toolbar__icon" width="16" height="16" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <circle cx="9" cy="9" r="2.25" stroke="currentColor" stroke-width="1.5" />
              <path
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2M3.4 3.4l1.4 1.4m7.2 7.2 1.4 1.4M3.4 14.6l1.4-1.4m7.2-7.2 1.4-1.4"
              />
            </svg>
          </button>
        </div>
      </header>

      <div class="tv-workspace">
        <aside id="drawing-toolbar" class="drawing-toolbar" aria-label="Drawing tools"></aside>
        <main class="tv-stage">
          <div class="tv-chart-wrap">
            <div class="tv-chart-wrap__stage">
              <div class="tv-watermark" aria-hidden="true">
                <span class="tv-watermark__text" id="watermark"></span>
              </div>
              <div id="chart"></div>
              <div class="status-line tv-ohlc" id="ohlc" aria-live="polite"></div>
            </div>
            <footer class="tv-chart-bottom-bar" aria-label="Chart bottom bar">
              <div class="tv-chart-bottom-bar__grow"></div>
              <div class="tv-chart-bottom-bar__right" id="chart-bottom-toolbar"></div>
            </footer>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
